name: Build APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: labelqc_pro
        run: flutter pub get

      - name: Build APK
        working-directory: labelqc_pro
        run: flutter build apk --release

      - name: Rename APK
        run: mv labelqc_pro/build/app/outputs/flutter-apk/app-release.apk IDT-LabelQC.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-build-${{ github.run_number }}
          name: "IDT LabelQC v1.0 (build ${{ github.run_number }})"
          body: |
            ## Descarga e instala la app

            1. Descarga el archivo **IDT-LabelQC.apk**
            2. En tu Android: Ajustes → Seguridad → Fuentes desconocidas → Activar
            3. Abre el APK y sigue los pasos
            4. Usuario: `admin` | Contraseña: `admin123`
          files: IDT-LabelQC.apk
          draft: false
          prerelease: false
